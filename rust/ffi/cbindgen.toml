language = "C"
pragma_once = true
include_guard = "APTOS_CONFIDENTIAL_ASSET_FFI_H"
autogen_warning = "/* Generated by cbindgen — do not hand-edit; run: cbindgen --config cbindgen.toml --crate aptos_confidential_asset_ffi --output include/aptos_confidential_asset.h */"
documentation_style = "doxy"
style = "both"

[export]
item_types = ["functions", "structs", "enums", "typedefs", "opaque"]
include = ["abi", "ffi"]

[parse]
parse_deps = false
