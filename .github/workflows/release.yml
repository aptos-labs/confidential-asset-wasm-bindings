name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: macos-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      version: ${{ steps.release_meta.outputs.version }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Authenticate as Aptos Labs Bot
        uses: actions/create-github-app-token@v3
        id: aptos-labs-bot-auth
        with:
          app-id: ${{ vars.APTOS_LABS_BOT_APP_ID }}
          private-key: ${{ secrets.APTOS_LABS_BOT_APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.aptos-labs-bot-auth.outputs.token }}

      - name: Setup tools
        uses: jdx/mise-action@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          key: wasm-release

      - name: Install dependencies
        run: npm ci

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
          # Changesets creates the GitHub Release (CHANGELOG body) during publish.
        env:
          GITHUB_TOKEN: ${{ steps.aptos-labs-bot-auth.outputs.token }}

      - name: Export published package version
        id: release_meta
        if: steps.changesets.outputs.published == 'true'
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      # Git tag for consumers (Go module pin, release page). FFI attach is workflow_call below.
      - name: Push semver git tag
        if: steps.changesets.outputs.published == 'true'
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          git fetch origin "${BRANCH}"
          git pull --ff-only origin "${BRANCH}"
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -qF "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists on origin; skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} exists locally (e.g. from changeset publish); pushing to origin."
            git push origin "refs/tags/${TAG}"
          else
            git tag -a "${TAG}" -m "chore(release): ${TAG} (npm + native FFI)"
            git push origin "refs/tags/${TAG}"
          fi

  native-ffi-release:
    name: Native FFI release
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/bindings-release.yml
    with:
      version: ${{ needs.release.outputs.version }}
      draft: false
    secrets: inherit
