name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Authenticate as Aptos Labs Bot
        uses: actions/create-github-app-token@v3
        id: aptos-labs-bot-auth
        with:
          app-id: ${{ vars.APTOS_LABS_BOT_APP_ID }}
          private-key: ${{ secrets.APTOS_LABS_BOT_APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.aptos-labs-bot-auth.outputs.token }}

      - name: Setup tools
        uses: jdx/mise-action@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          key: wasm-release

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ steps.aptos-labs-bot-auth.outputs.token }}
          NPM_TOKEN: ${{ secrets.APTOS_LABS_NPM_TOKEN }}
